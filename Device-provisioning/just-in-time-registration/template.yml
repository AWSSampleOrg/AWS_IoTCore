AWSTemplateFormatVersion: "2010-09-09"
Description: JITR Setup

Parameters:
  Prefix:
    Type: String
    Default: jitr

Resources:
  Policy:
    Type: AWS::IoT::Policy
    Properties:
      PolicyName: !Sub ${Prefix}-policy
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Action: iot:Connect
            Resource: !Join
              - ""
              - - !Sub arn:${AWS::Partition}:iot:${AWS::Region}:${AWS::AccountId}:client/
                - ${iot:Connection.Thing.ThingName}
            Condition:
              Bool:
                iot:Connection.Thing.IsAttached: "true"
          - Effect: Allow
            Action: iot:Publish
            Resource: !Join
              - ""
              - - !Sub arn:${AWS::Partition}:iot:${AWS::Region}:${AWS::AccountId}:topic/*/
                - ${iot:Connection.Thing.ThingName}/*
          - Effect: Allow
            Action: iot:Subscribe
            Resource: !Join
              - ""
              - - !Sub arn:${AWS::Partition}:iot:${AWS::Region}:${AWS::AccountId}:topicfilter/*/
                - ${iot:Connection.Thing.ThingName}/*
          - Effect: Allow
            Action: iot:Receive
            Resource: !Join
              - ""
              - - !Sub arn:${AWS::Partition}:iot:${AWS::Region}:${AWS::AccountId}:topic/*/
                - ${iot:Connection.Thing.ThingName}/*

  Table:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub ${Prefix}-SerialNumbers
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: serialNumber
          AttributeType: S
      KeySchema:
        - AttributeName: serialNumber
          KeyType: HASH

  LambdaRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: Access
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - iot:*
                  - dynamodb:Query
                Resource: "*"

  Lambda:
    Type: AWS::Lambda::Function
    Properties:
      Runtime: python3.14
      Handler: lambda_function.lambda_handler
      Role: !GetAtt LambdaRole.Arn
      Timeout: 60
      Environment:
        Variables:
          TABLE: !Ref Table
          POLICY: !Ref Policy
      Code:
        ZipFile: |
          import boto3, os
          from cryptography import x509
          from cryptography.hazmat.backends import default_backend
          iot = boto3.client('iot')
          ddb = boto3.client('dynamodb')
          def lambda_handler(event, context):
              cert_id = event['certificateId']
              resp = iot.describe_certificate(certificateId=cert_id)
              cert = x509.load_pem_x509_certificate(resp['certificateDescription']['certificatePem'].encode(), default_backend())
              sn = str(cert.serial_number)
              if not ddb.query(TableName=os.environ['TABLE'], KeyConditionExpression='serialNumber = :s', ExpressionAttributeValues={':s': {'S': sn}}).get('Items'):
                  return {'statusCode': 403}
              iot.create_thing(thingName=sn)
              iot.update_certificate(certificateId=cert_id, newStatus='ACTIVE')
              iot.attach_policy(policyName=os.environ['POLICY'], target=resp['certificateDescription']['certificateArn'])
              iot.attach_thing_principal(thingName=sn, principal=resp['certificateDescription']['certificateArn'])
              return {'statusCode': 200}

  Rule:
    Type: AWS::IoT::TopicRule
    Properties:
      TopicRulePayload:
        Sql: SELECT * FROM '$aws/events/certificates/registered/+' WHERE certificateStatus = 'PENDING_ACTIVATION'
        Actions:
          - Lambda:
              FunctionArn: !GetAtt Lambda.Arn

  Permission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref Lambda
      Action: lambda:InvokeFunction
      Principal: iot.amazonaws.com
      SourceArn: !GetAtt Rule.Arn

Outputs:
  TableName:
    Value: !Ref Table
