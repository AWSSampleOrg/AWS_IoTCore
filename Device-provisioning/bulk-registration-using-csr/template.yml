AWSTemplateFormatVersion: "2010-09-09"
Description: Bulk Registration

Parameters:
  Prefix:
    Type: String
    Default: bulk

Resources:
  ThingType:
    Type: AWS::IoT::ThingType
    Properties:
      ThingTypeName: !Sub ${Prefix}-Type

  ThingGroup:
    Type: AWS::IoT::ThingGroup
    Properties:
      ThingGroupName: !Sub ${Prefix}-Group

  Policy:
    Type: AWS::IoT::Policy
    Properties:
      PolicyName: !Sub ${Prefix}-policy
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Action: iot:Connect
            Resource: !Sub arn:${AWS::Partition}:iot:${AWS::Region}:${AWS::AccountId}:client/$${iot:Connection.Thing.ThingName}
            Condition:
              Bool:
                iot:Connection.Thing.IsAttached: "true"
          - Effect: Allow
            Action: iot:Publish
            Resource: !Sub arn:${AWS::Partition}:iot:${AWS::Region}:${AWS::AccountId}:topic/*/$${iot:Connection.Thing.ThingName}/*
          - Effect: Allow
            Action: iot:Subscribe
            Resource: !Sub arn:${AWS::Partition}:iot:${AWS::Region}:${AWS::AccountId}:topicfilter/*/$${iot:Connection.Thing.ThingName}/*
          - Effect: Allow
            Action: iot:Receive
            Resource: !Sub arn:${AWS::Partition}:iot:${AWS::Region}:${AWS::AccountId}:topic/*/$${iot:Connection.Thing.ThingName}/*

  Bucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub ${Prefix}-${AWS::AccountId}

  Role:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: iot.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSIoTThingsRegistration
      Policies:
        - PolicyName: S3
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: s3:GetObject
                Resource: !Sub ${Bucket.Arn}/*

Outputs:
  RoleArn:
    Value: !GetAtt Role.Arn
  Bucket:
    Value: !Ref Bucket
