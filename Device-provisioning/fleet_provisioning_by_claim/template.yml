AWSTemplateFormatVersion: "2010-09-09"
Description: Fleet Provisioning - Complete Setup

Parameters:
  Prefix:
    Type: String
    Default: fleet

Resources:
  ThingType:
    Type: AWS::IoT::ThingType
    Properties:
      ThingTypeName: !Sub ${Prefix}-Type

  ThingGroup:
    Type: AWS::IoT::ThingGroup
    Properties:
      ThingGroupName: !Sub ${Prefix}-Group

  DevicePolicy:
    Type: AWS::IoT::Policy
    Properties:
      PolicyName: !Sub ${Prefix}-device-policy
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Action: iot:Connect
            Resource: !Sub arn:${AWS::Partition}:iot:${AWS::Region}:${AWS::AccountId}:client/$${iot:Connection.Thing.ThingName}
            Condition:
              Bool:
                iot:Connection.Thing.IsAttached: "true"
          - Effect: Allow
            Action: iot:Publish
            Resource: !Sub arn:${AWS::Partition}:iot:${AWS::Region}:${AWS::AccountId}:topic/*/$${iot:Connection.Thing.ThingName}/*
          - Effect: Allow
            Action: iot:Subscribe
            Resource: !Sub arn:${AWS::Partition}:iot:${AWS::Region}:${AWS::AccountId}:topicfilter/*/$${iot:Connection.Thing.ThingName}/*
          - Effect: Allow
            Action: iot:Receive
            Resource: !Sub arn:${AWS::Partition}:iot:${AWS::Region}:${AWS::AccountId}:topic/*/$${iot:Connection.Thing.ThingName}/*

  ClaimPolicy:
    Type: AWS::IoT::Policy
    Properties:
      PolicyName: !Sub ${Prefix}-claim-policy
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Action: iot:Connect
            Resource: "*"
          - Effect: Allow
            Action: iot:Publish
            Resource:
              - !Sub arn:${AWS::Partition}:iot:${AWS::Region}:${AWS::AccountId}:topic/$aws/certificates/create/*
              - !Sub arn:${AWS::Partition}:iot:${AWS::Region}:${AWS::AccountId}:topic/$aws/provisioning-templates/${Prefix}-template/provision/*
          - Effect: Allow
            Action: iot:Subscribe
            Resource:
              - !Sub arn:${AWS::Partition}:iot:${AWS::Region}:${AWS::AccountId}:topicfilter/$aws/certificates/create/*
              - !Sub arn:${AWS::Partition}:iot:${AWS::Region}:${AWS::AccountId}:topicfilter/$aws/provisioning-templates/${Prefix}-template/provision/*
          - Effect: Allow
            Action: iot:Receive
            Resource:
              - !Sub arn:${AWS::Partition}:iot:${AWS::Region}:${AWS::AccountId}:topic/$aws/certificates/create/*
              - !Sub arn:${AWS::Partition}:iot:${AWS::Region}:${AWS::AccountId}:topic/$aws/provisioning-templates/${Prefix}-template/provision/*

  Role:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: iot.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSIoTThingsRegistration

  HookRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

  Hook:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub ${Prefix}-hook
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt HookRole.Arn
      Code:
        ZipFile: |
          def handler(event, context):
              sn = event.get('parameters', {}).get('SerialNumber', '')
              if sn.startswith('123456'):
                  return {'allowProvisioning': True, 'parameterOverrides': {'ThingName': f"Device-{sn}"}}
              return {'allowProvisioning': False}

  HookPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref Hook
      Action: lambda:InvokeFunction
      Principal: iot.amazonaws.com

  ProvisioningTemplate:
    Type: AWS::IoT::ProvisioningTemplate
    Properties:
      Enabled: true
      ProvisioningRoleArn: !GetAtt Role.Arn
      PreProvisioningHook:
        TargetArn: !GetAtt Hook.Arn
      TemplateName: !Sub ${Prefix}-template
      TemplateType: FLEET_PROVISIONING
      TemplateBody: !Sub |
        {
          "Parameters": {
            "SerialNumber": {"Type": "String"}
          },
          "Resources": {
            "thing": {
              "Type": "AWS::IoT::Thing",
              "Properties": {
                "ThingName": {"Ref": "SerialNumber"},
                "ThingTypeName": "${ThingType}",
                "ThingGroups": ["${ThingGroup}"]
              }
            },
            "certificate": {
              "Type": "AWS::IoT::Certificate",
              "Properties": {
                "CertificateId": {"Ref": "AWS::IoT::Certificate::Id"},
                "Status": "ACTIVE"
              }
            },
            "policy": {
              "Type": "AWS::IoT::Policy",
              "Properties": {
                "PolicyName": "${DevicePolicy}"
              }
            }
          }
        }

  ClaimCert:
    Type: AWS::IoT::Certificate
    Properties:
      Status: ACTIVE

  ClaimPolicyAttachment:
    Type: AWS::IoT::PolicyPrincipalAttachment
    Properties:
      PolicyName: !Ref ClaimPolicy
      Principal: !GetAtt ClaimCert.Arn

Outputs:
  TemplateName:
    Value: !Ref ProvisioningTemplate
  ClaimCertId:
    Value: !Ref ClaimCert
  ClaimCertPem:
    Value: !GetAtt ClaimCert.CertificatePem
  Endpoint:
    Value: !Sub ${AWS::AccountId}.iot.${AWS::Region}.amazonaws.com
